<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匡树辉老师退休倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            padding: 20px;
        }
        
        .container {
            background: #111;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 900px;
            width: 100%;
            border: 1px solid #222;
            margin-bottom: 0px;
        }
        
        .header {
            margin-bottom: 0px;
        }
        
        h1 {
            color: #2E7D32;
            margin-bottom: 10px;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 
                2px 2px 0 rgba(0, 0, 0, 0.1),
                1px 1px 0 #fff;
            letter-spacing: 1px;
            position: relative;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 6px;
            background: linear-gradient(90deg, transparent, #4CAF50, transparent);
            border-radius: 3px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.2rem;
            font-weight: 300;
        }
        
        .target-date {
            position: relative;
            background-color: rgba(26, 26, 26, 0.85);
            height: 600px; 
            border-radius: 12px;
            padding: 0;
            margin-bottom: 0px;
            border: 1px solid #333;
            min-height: 300px;
            width: 100%;
        }

        /* 固定图片层（原始图片 ksh.png） */
        .target-date::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('ksh.png');
            background-size: cover;
            background-position: bottom;
            background-repeat: no-repeat;
            z-index: 2;
            pointer-events: none;
        }

        /* 循环切换图片层 - 默认背景图（可选） */
        .target-date::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: bottom;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        /* 定义三个切换类，分别对应三张背景图 */
        .target-date.bg1::after {
            background-image: url('bcleft.png');  /* 替换为实际图片路径 */
        }
        .target-date.bg2::after {
            background-image: url('bccenter.png');
        }
        .target-date.bg3::after {
            background-image: url('bcright.png');
        }
        
        .target-date span {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 100%;
            text-align: center;
            white-space: normal;
            word-break: break-word;
            font-size: 5rem;
            color: #66BB6A;
            font-weight: 900;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.1);
            line-height: 1.2;
            padding-bottom: 20px;
            z-index: 3;
        }
        
        .countdown {
            display: flex;
            justify-content: center;
            gap: 0px;
            flex-wrap: wrap;
            margin-bottom: 0px;
        }

        .time-unit {
            background: rgba(21, 21, 21, 0.85);
            border-radius: 16px;
            padding: 35px 25px;
            min-width: 160px;
            border: 1px solid #2a2a2a;
        }
        
        .number {
            font-size: 5rem;
            font-weight: 900;
            color: #81C784;
            margin-bottom: 0px;
            text-shadow: 
                3px 3px 0 rgba(0, 0, 0, 0.1),
                1px 1px 0 #fff,
                -1px -1px 0 rgba(255, 255, 255, 0.3);
            transform: scale(1.02, 1);
        }
        
        .label {
            font-size: 1.1rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .complete {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 40px;
            margin-top: 30px;
            border: 1px solid #333;
            display: none;
        }
        
        .complete span {
            font-size: 2.5rem;
            color: #4CAF50;
            font-weight: 300;
            display: block;
            margin-bottom: 0px;
        }
        
        .music-player {
            background: #111;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        
        .player-title {
            color: #4CAF50;
            font-size: 2rem;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 900;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.2);
        }
        
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .control-btn {
            background: #1a1a1a;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            border: 2px solid #2E7D32;
        }
        
        .control-btn:hover {
            background: #2E7D32;
            transform: scale(1.1);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .control-btn i {
            font-size: 1.8rem;
            color: #4CAF50;
        }
        
        .control-btn:hover i {
            color: #fff;
        }
        
        .play-btn {
            width: 70px;
            height: 70px;
            background: #2E7D32;
        }
        
        .play-btn i {
            color: #fff;
            font-size: 2.2rem;
        }
        
        .progress-container {
            background: #1a1a1a;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            border: 1px solid #333;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #2E7D32, #4CAF50);
            border-radius: 10px;
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .time-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .song-info {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .song-title {
            color: #66BB6A;
            font-size: 1.5rem;
            margin-bottom: 5px;
            font-weight: 700;
        }
        
        .song-artist {
            color: #888;
            font-size: 1rem;
        }
        
        .playlist {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #333;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .playlist h3 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .playlist-item {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .playlist-item:hover {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }
        
        .playlist-item.active {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border-left: 4px solid #4CAF50;
        }
        
        .song-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .action-btn:hover {
            color: #4CAF50;
        }
        
        .file-input-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }
        
        .file-input-label {
            background: #2E7D32;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .file-input-label:hover {
            background: #4CAF50;
            transform: translateY(-2px);
        }
        
        #fileInput {
            display: none;
        }
        
        .selected-file-info {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        .file-format-info {
            color: #666;
            font-size: 0.8rem;
            margin-top: 5px;
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 35px 25px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .countdown {
                gap: 0px;
            }
            
            .time-unit {
                min-width: 130px;
                padding: 25px 15px;
            }
            
            .number {
                font-size: 3.5rem;
            }

            .target-date {
                min-height: 250px;
                height: 320px;
            }
            
            .target-date span {
                font-size: 3.5rem;
                width: 90%;
                padding-bottom: 15px;
            }
            
            .music-player {
                padding: 20px;
            }
            
            .player-title {
                font-size: 1.5rem;
            }
            
            .control-btn {
                width: 50px;
                height: 50px;
            }
            
            .play-btn {
                width: 60px;
                height: 60px;
            }
            
            .file-input-container {
                flex-direction: column;
                align-items: stretch;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .time-unit {
                min-width: 110px;
                padding: 20px 10px;
            }
            
            .number {
                font-size: 2.8rem;
            }
            
            .label {
                font-size: 0.9rem;
            }
            
            .target-date {
                min-height: 200px;
            }
            
            .target-date span {
                font-size: 2.2rem;
                width: 95%;
                padding-bottom: 10px;
            }
            
            .player-controls {
                gap: 10px;
            }
            
            .control-btn {
                width: 45px;
                height: 45px;
            }
            
            .play-btn {
                width: 50px;
                height: 50px;
            }
            
            .playlist-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .song-actions {
                margin-top: 5px;
                align-self: flex-end;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>匡树辉老师退休倒计时</h1>
            <div class="subtitle">距离目标时间剩余</div>
        </div>
        
        <div class="target-date" id="targetDateContainer">
            <span id="targetDateDisplay">2027年1月30日 00:00:00</span>
        </div>
        
        <div class="countdown">
            <div class="time-unit">
                <div class="number" id="days">00</div>
                <div class="label">天</div>
            </div>
            <div class="time-unit">
                <div class="number" id="hours">00</div>
                <div class="label">小时</div>
            </div>
            <div class="time-unit">
                <div class="number" id="minutes">00</div>
                <div class="label">分钟</div>
            </div>
            <div class="time-unit">
                <div class="number" id="seconds">00</div>
                <div class="label">秒</div>
            </div>
        </div>
        
        <div class="complete" id="completeMessage">
            <span>快乐时光开始</span>
        </div>
    </div>
    
    <div class="music-player">
        <h2 class="player-title">🎵 时光音乐盒</h2>
        
        <div class="song-info">
            <div class="song-title" id="currentSongTitle">半日闲游</div>
            <div class="song-artist" id="currentSongArtist">郝云&倪大红 - 话剧银锭桥插曲</div>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="player-controls">
            <button class="control-btn" id="prevBtn" title="重新开始">
                <i class="fas fa-redo"></i>
            </button>
            
            <button class="control-btn play-btn" id="playBtn" title="播放">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
            
            <button class="control-btn" id="nextBtn" title="重新开始">
                <i class="fas fa-redo"></i>
            </button>
        </div>
        
        <div class="playlist">
            <h3>播放列表 <span id="playlistCount">(1 首歌曲)</span></h3>
            <div id="playlistItems">
                <div class="playlist-item active">
                    <strong style="color: #4CAF50;">
                        <i class="fas fa-star"></i> 半日闲游
                    </strong><br>
                    <small style="color: #4CAF50;">
                        <i class="fas fa-user"></i> 郝云&倪大红 - 话剧银锭桥插曲<br>
                        <i class="fas fa-music"></i> 倪郝(ni hao)中国第一中老年影视歌三栖搖滾组合
                    </small>
                    <div class="song-actions">
                        <button class="action-btn" title="删除" style="opacity: 0.5; cursor: not-allowed;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="file-input-container">
                <label for="fileInput" class="file-input-label">
                    <i class="fas fa-plus"></i> 选择本地音乐文件
                </label>
                <input type="file" id="fileInput" accept="audio/*" multiple>
                <div class="selected-file-info" id="selectedFileInfo">
                    <strong>当前歌曲:</strong><br>
                    半日闲游 - 郝云&倪大红<br>
                    <small>点击播放按钮开始欣赏</small>
                </div>
            </div>
            
            <div class="file-format-info">
                支持格式: MP3, WAV, OGG, M4A 等音频格式
            </div>
        </div>
    </div>

    <script>
        // ===== 倒计时功能代码 =====
        let targetDate = new Date('2027-01-30T00:00:00').getTime();
        
        function updateTargetDateDisplay() {
            const dateObj = new Date(targetDate);
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth() + 1;
            const day = dateObj.getDate();
            const hours = dateObj.getHours().toString().padStart(2, '0');
            const minutes = dateObj.getMinutes().toString().padStart(2, '0');
            const seconds = dateObj.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('targetDateDisplay').textContent = 
                `${year}年${month}月${day}日 ${hours}:${minutes}:${seconds}`;
        }
        
        function updateCountdown() {
            const now = new Date().getTime();
            const timeLeft = targetDate - now;
            
            if (timeLeft < 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('completeMessage').style.display = 'block';
                return;
            }
            
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }
        
        // ===== 音乐播放器功能代码 =====
        class MusicPlayer {
            constructor() {
                this.audio = new Audio();
                this.isPlaying = false;
                this.isLooping = false;
                
                // 你的音频文件
                this.AUDIO_FILE = "郝云&倪大红半日闲游Music Video  话剧银锭桥插曲  倪郝ni hao中国第一中老年影视歌三栖搖滾组合.mp3";
                
                // DOM 元素
                this.playBtn = document.getElementById('playBtn');
                this.playIcon = document.getElementById('playIcon');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.progressBar = document.getElementById('progressBar');
                this.progressContainer = document.getElementById('progressContainer');
                this.currentTimeEl = document.getElementById('currentTime');
                this.durationEl = document.getElementById('duration');
                this.currentSongTitle = document.getElementById('currentSongTitle');
                this.currentSongArtist = document.getElementById('currentSongArtist');
                this.playlistItems = document.getElementById('playlistItems');
                this.playlistCount = document.getElementById('playlistCount');
                this.fileInput = document.getElementById('fileInput');
                this.selectedFileInfo = document.getElementById('selectedFileInfo');
                
                // 初始化歌曲信息
                this.currentSongTitle.textContent = "半日闲游";
                this.currentSongArtist.textContent = "郝云&倪大红 - 话剧银锭桥插曲";
                
                // 绑定事件
                this.bindEvents();
                
                // 加载音频
                this.loadAudio();
            }
            
            bindEvents() {
                this.playBtn.addEventListener('click', () => this.togglePlayPause());
                this.prevBtn.addEventListener('click', () => this.restartSong());
                this.nextBtn.addEventListener('click', () => this.restartSong());
                this.progressContainer.addEventListener('click', (e) => this.setProgress(e));
                
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
                this.audio.addEventListener('ended', () => {
                    if (this.isLooping) {
                        this.restartSong();
                    }
                });
                
                this.fileInput.addEventListener('change', (e) => this.handleFileSelect(e));
                
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        this.togglePlayPause();
                    }
                });
            }
            
            loadAudio() {
                this.audio.src = this.AUDIO_FILE;
                this.audio.loop = this.isLooping;
                this.audio.addEventListener('loadedmetadata', () => {
                    this.updateDuration();
                });
            }
            
            togglePlayPause() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }
            
            play() {
                this.audio.play().then(() => {
                    this.isPlaying = true;
                    this.playIcon.classList.remove('fa-play');
                    this.playIcon.classList.add('fa-pause');
                    this.playBtn.title = "暂停";
                }).catch(error => {
                    console.log('播放错误:', error);
                    this.selectedFileInfo.innerHTML = `
                        <strong style="color: #f44336;">播放失败!</strong><br>
                        <small>请检查音频文件路径: ${this.AUDIO_FILE}</small><br>
                        <small>确保文件与HTML在同一目录</small>
                    `;
                });
            }
            
            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.playIcon.classList.remove('fa-pause');
                this.playIcon.classList.add('fa-play');
                this.playBtn.title = "播放";
            }
            
            restartSong() {
                this.audio.currentTime = 0;
                if (this.isPlaying) {
                    this.audio.play();
                }
            }
            
            updateProgress() {
                const { currentTime, duration } = this.audio;
                const progressPercent = (currentTime / duration) * 100;
                
                this.progressBar.style.width = `${progressPercent}%`;
                this.currentTimeEl.textContent = this.formatTime(currentTime);
            }
            
            updateDuration() {
                if (!isNaN(this.audio.duration)) {
                    this.durationEl.textContent = this.formatTime(this.audio.duration);
                }
            }
            
            setProgress(e) {
                const width = this.progressContainer.clientWidth;
                const clickX = e.offsetX;
                const duration = this.audio.duration;
                
                if (!isNaN(duration)) {
                    this.audio.currentTime = (clickX / width) * duration;
                }
            }
            
            formatTime(seconds) {
                if (isNaN(seconds) || seconds === Infinity) return "0:00";
                
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            handleFileSelect(event) {
                const files = event.target.files;
                if (files.length === 0) return;
                
                this.selectedFileInfo.innerHTML = `
                    <strong>已选择 ${files.length} 个文件</strong><br>
                    <small>但当前播放的仍是: 半日闲游</small><br>
                    <small>点击播放按钮继续欣赏推荐歌曲</small>
                `;
                
                event.target.value = '';
            }
        }
        
        // ===== 初始化 =====
        function init() {
            updateTargetDateDisplay();
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            const player = new MusicPlayer();
            
            // 修改按钮图标为重新开始
            document.querySelector('#prevBtn i').className = 'fas fa-redo';
            document.querySelector('#nextBtn i').className = 'fas fa-redo';

            // 循环切换三张背景图片（通过类名切换）
            const targetDate = document.getElementById('targetDateContainer');
            // 定义三张图片对应的类名数组（与CSS中定义的一致）
            const bgClasses = ['bg1', 'bg2', 'bg3'];
            let currentIndex = 0;

            // 预先加载图片（可选，避免第一次切换加载延迟）
            bgClasses.forEach((cls, idx) => {
                const img = new Image();
                // 根据类名获取图片路径（这里简单写，实际应与CSS中路径一致）
                // 为简化，可以硬编码路径，或者从CSS中提取
                // 直接预加载图片即可
                img.src = `image${idx+1}.png`; // 假设图片名为 image1.png, image2.png, image3.png
            });

            // 设置初始类
            targetDate.classList.add(bgClasses[0]);

            // 每3秒切换一次
            setInterval(() => {
                // 移除当前类
                targetDate.classList.remove(bgClasses[currentIndex]);
                // 更新索引
                currentIndex = (currentIndex + 1) % bgClasses.length;
                // 添加新类
                targetDate.classList.add(bgClasses[currentIndex]);
            }, 3000);
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
